name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  docker-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/smartstudy-backend

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  build-binaries:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: linux
            cmake_flags: ""
            ext: ""
          - os: windows-latest
            target: windows
            cmake_flags: "-DCMAKE_TOOLCHAIN_FILE=../toolchain-mingw.cmake" # Supposant une cross-compil ou builder windows natif
            ext: ".exe"
    steps:
      - uses: actions/checkout@v4

      - name: Install Build Dependencies (Linux)
        if: matrix.target == 'linux'
        run: sudo apt-get update && sudo apt-get install -y cmake build-essential libsqlite3-dev libcurl4-openssl-dev libssl-dev

      - name: Install Build Dependencies (Windows cross-compilation)
        if: matrix.target == 'windows'
        run: sudo apt-get update && sudo apt-get install -y mingw-w64

      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release ${{ matrix.cmake_flags }}

      - name: Build
        run: cmake --build build --config Release

      - name: Package Binary
        run: |
          mkdir -p package
          cp build/smartstudy${{ matrix.ext }} package/
          cd package
          tar -czvf ../smartstudy-${{ matrix.target }}.tar.gz smartstudy${{ matrix.ext }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.target }}
          path: smartstudy-${{ matrix.target }}.tar.gz

  github-release:
    needs: build-binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all workflow run artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/**/*.tar.gz
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  itch-io-release:
    needs: build-binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download Windows Artifact
        uses: actions/download-artifact@v4
        with:
          name: binary-windows
          path: release-windows

      - name: Setup Butler
        run: |
          curl -L -o butler.zip https://broth.itch.ovh/butler/linux-amd64/LATEST/archive/default
          unzip butler.zip
          chmod +x butler
          sudo mv butler /usr/local/bin/

      - name: Push to Itch.io
        env:
          BUTLER_API_KEY: ${{ secrets.BUTLER_API_KEY }}
        run: |
          # Remplacez "youruser/smartstudy" par votre page itch.io
          butler push release-windows youruser/smartstudy:windows --userversion ${{ github.ref_name }}
